version: 1
purpose: "Interface-level role registry for agentic teams"
notes:
  - "Detailed checklists live in TEAM-CHECKLIST.md"
  - "Persona prompts live in personas/*.md"
roles:
  - name: Lead
    responsibility: "Orchestrate work; assign tasks; integrate results; own final output"
    typical_outputs:
      - "Session kickoff/plan"
      - "Lead synthesis report"
      - "Integration notes"
      - "Verification status"
      - "Handoff notes"
    persona_file: "personas/LEAD.md (optional)"
    checklist_reference: null
  - name: "Product Manager / Product Owner (PM/PO)"
    responsibility: "Priorities, success metrics, acceptance criteria"
    typical_outputs:
      - "Epic/story framing"
      - "Definition of Ready / Done"
      - "Acceptance criteria"
      - "Release notes / go-no-go rationale"
    persona_file: "personas/PM.md"
    checklist_reference: "TEAM-CHECKLIST.md -> Product Owner"
  - name: "Business Analyst (BA)"
    responsibility: "Requirements fidelity, process + data clarity"
    typical_outputs:
      - "BRD/spec"
      - "As-is/to-be flows"
      - "Data dictionary"
      - "UAT scenarios"
    persona_file: "personas/BA.md"
    checklist_reference: "TEAM-CHECKLIST.md -> Business Analyst"
  - name: "Engineering (ENG: FE/BE/FS)"
    responsibility: "Implementation"
    typical_outputs:
      - "Code + tests"
      - "Docs"
      - "Migrations (if needed)"
    persona_file: "personas/ENG.md"
    checklist_reference: "TEAM-CHECKLIST.md -> Frontend/Backend"
  - name: "UX/UI (UX)"
    responsibility: "Flows, interaction states, accessibility"
    typical_outputs:
      - "IA/flows"
      - "State table"
      - "Copy guidance"
      - "Edge-case handling notes"
    persona_file: "personas/UX.md"
    checklist_reference: "TEAM-CHECKLIST.md -> UX/UI"
  - name: "Quality Assurance (QA)"
    responsibility: "Verification and release readiness"
    typical_outputs:
      - "Test plan"
      - "Test cases"
      - "Regression targets"
      - "Findings summary"
      - "Signoff recommendation"
    persona_file: "personas/QA.md"
    checklist_reference: "TEAM-CHECKLIST.md -> QA"
